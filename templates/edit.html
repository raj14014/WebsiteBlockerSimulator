<!DOCTYPE html>
<html>

<head>

    <title>Change Password</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">

🔑 Change Password

</h2>

<form method="POST">

<div class="mb-3">

<label>Old Password</label>

<input
type="password"
name="old_password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>New Password</label>

<input
type="password"
name="new_password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<input
type="password"
name="confirm_password"
class="form-control"
required>

</div>

<button class="btn btn-warning w-100">

Update Password

</button>

</form>

{% if error %}

<div class="alert alert-danger mt-3">

{{ error }}

</div>

{% endif %}

{% if success %}

<div class="alert alert-success mt-3">

{{ success }}

</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>

</html>
